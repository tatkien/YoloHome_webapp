services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TZ: Asia/Ho_Chi_Minh
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
      POSTGRES_DB: ${POSTGRES_DB:-yolohome}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TZ: Asia/Ho_Chi_Minh
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:change_me_local@db:5432/yolohome}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-mqtt}
      MQTT_PORT: ${MQTT_PORT:-1883}
      SECRET_KEY: ${SECRET_KEY:-change_me_local}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./models:/models
      - ./models/whisper_cache:/root/.cache/huggingface
      - backend_deps:/app/node_modules

  frontend:
    build:
      context: ./frontend
      target: build
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: ["npx", "react-scripts", "start"]
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log  
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  frontend_modules:
  backend_deps:
